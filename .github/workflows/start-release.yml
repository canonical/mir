name: Start Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.24.0)'
        required: true
        type: string
      sha:
        description: 'Commit-ish to release (defaults to branch tip)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha || github.sha }}

      - name: Import GPG key
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.MIR_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MIR_BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Validate version and extract components
        id: version
        run: |
          if [[ "${{ inputs.version }}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "major=${BASH_REMATCH[1]}" | tee --append $GITHUB_OUTPUT
            echo "minor=${BASH_REMATCH[2]}" | tee --append $GITHUB_OUTPUT
            echo "patch=${BASH_REMATCH[3]}" | tee --append $GITHUB_OUTPUT
            echo "release_branch=release/${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" | tee --append $GITHUB_OUTPUT
            echo "next_version=${BASH_REMATCH[1]}.$(( ${BASH_REMATCH[2]} + 1 )).0" | tee --append $GITHUB_OUTPUT
          else
            echo ":error: Version '${{ inputs.version }}' is not in the format X.Y.Z"
            exit 1
          fi

      - name: Release Debian symbols
        run: |
          awk --include=inplace \
            -v version_pat='${{ inputs.version }}~dev$' \
            -v version="${{ inputs.version }}" '
            $0~version_pat {
              gsub(version "~dev$", version)
            }
            { print }
          ' debian/*.symbols

          git add debian/*.symbols

      - name: Update CMake version
        run: |
          sed --in-place -E 's/(VERSION\s+)[0-9]+\.[0-9]+\.[0-9]+/\1${{ inputs.version }}/' CMakeLists.txt
          git add CMakeLists.txt

      - name: Commit Release Candidate
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Begin Release Candidate for ${{ inputs.version }} release"
          fi

      - name: Create release tag
        run: |
          git tag --annotate "v${{ inputs.version }}-rc" --message "Release candidate ${{ inputs.version }}"

      - name: Find previous release tag
        id: previous_tag
        run: |
          # Get the most recent tag excluding -rc and -dev tags
          PREVIOUS_TAG=$(git describe --abbrev=0 --exclude="*-rc" --exclude="*-dev" "${{ inputs.sha || github.sha }}" 2>/dev/null || echo "")
          echo "tag=$PREVIOUS_TAG" | tee --append $GITHUB_OUTPUT

      - name: Push to the release branch
        run: |
          git push origin "HEAD:refs/heads/${{ steps.version.outputs.release_branch }}"

      - name: Create draft GitHub release
        uses: actions/github-script@v8
        with:
          script: |
            const generatedNotes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ inputs.version }}`,
              target_commitish: `${{ steps.version.outputs.release_branch }}`,
              previous_tag_name: `${{ steps.previous_tag.outputs.tag }}`
            });

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ inputs.version }}`,
              target_commitish: `${{ steps.version.outputs.release_branch }}`,
              name: `Mir ${{ inputs.version }}`,
              body: generatedNotes.data.body,
              draft: true,
              prerelease: false
            });

            console.log(`:notice: Created draft release ${release.data.html_url}`);

      - name: Push the Release Candidate tag
        run: |
          git push origin "v${{ inputs.version }}-rc"

      - name: Start development of next version
        if: github.ref == 'refs/heads/main' && inputs.sha == ''
        env:
          DEBFULLNAME: ${{ steps.gpg.outputs.name }}
          DEBEMAIL: ${{ steps.gpg.outputs.email }}
        run: |
          # Bump CMake version
          sed --in-place -E 's/(VERSION\s+)[0-9]+\.[0-9]+\.[0-9]+/\1${{ steps.version.outputs.next_version }}/' CMakeLists.txt

          # Add a Debian changelog entry
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends devscripts
          debchange --newversion '${{ steps.version.outputs.next_version }}~dev' ''

          awk --include=inplace \
            -v next_version='${{ steps.version.outputs.next_version }}' \
            -v begin_pat='Begin development for ${{ steps.version.outputs.version }}' '
            $0~begin_pat {
              print "  * Begin development for " next_version " release"
              in_release=1
              next
            }
            in_release && /ABI summary/ {
              abi_summary=1
            }
            abi_summary && /bumped to/ {
              gsub(/bumped to/, "unchanged at")
            }
            abi_summary && /^$/ {
              in_release=0
              abi_summary=0
            }
            { print }
          ' debian/changelog

          # Update the RPM changelog
          awk --include=inplace \
            -v version_pat='${{ inputs.version }}~dev-1$' \
            -v begin_pat='Begin development for ${{ inputs.version }}' \
            -v next_version='${{ steps.version.outputs.next_version }}' \
            -v name='${{ steps.gpg.outputs.name }}' \
            -v email='${{ steps.gpg.outputs.email }}' \
            -v date="$(date "+%a, %b %d %Y")" '
            /^%changelog/ {
              print
              print "* " date " " name " <" email "> - " next_version "~dev-1"
              print "- Begin development for " next_version " release"
              next
            }
            $0~version_pat {
              next
            }
            $0~begin_pat {
              next
            }
            { print }
          ' rpm/mir.spec

          git add CMakeLists.txt debian/changelog rpm/mir.spec
          git commit -m 'Start development for ${{ steps.version.outputs.next_version }} release'
          git push origin "HEAD:${{ github.ref }}"
