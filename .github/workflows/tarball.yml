name: Build a tarball

on:
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+
  workflow_dispatch:
    inputs:
      version:
        description: The version to build the tarball for
        required: true

permissions: {}

jobs:
  BuildTarball:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
    - name: Determine version to build
      id: get-version
      env:
        INPUTS_VERSION: ${{ inputs.version }}
      run: |
        if ${{ github.event_name == 'push' }}; then
          version="$( echo "${GITHUB_REF}" | sed 's@^refs/tags/v@@' )"
        else
          version="${INPUTS_VERSION}"
        fi

        # assert it's a version number
        set -x
        [[ ${version} =~ ^[0-9]+.[0-9]+.[0-9]+$ ]] && echo "version=${version}" >> $GITHUB_OUTPUT

    - name: Import GPG key
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
      with:
        gpg_private_key: ${{ secrets.MIR_BOT_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.MIR_BOT_GPG_PASSPHRASE }}

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Build the tarball
      env:
        VERSION: ${{ steps.get-version.outputs.version }}
      run: |
        ./tools/make_release_tarball --skip-checks --release-tag v${VERSION}
        gpg --detach-sig --sign --output mir-${VERSION}.tar.xz.asc mir-${VERSION}.tar.xz

    - name: Store the tarball and signature
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: mir-${{ steps.get-version.outputs.version }}
        path: |
          mir-${{ steps.get-version.outputs.version }}.tar.xz
          mir-${{ steps.get-version.outputs.version }}.tar.xz.asc

    - name: Upload tarball to release
      if: github.event_name == 'push'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        VERSION: ${{ steps.get-version.outputs.version }}
      with:
        script: |
          const fs = require('fs');
          const version = process.env.VERSION;
          const tag = `v${version}`;

          // Get the release by tag
          let release;
          const response = await github.rest.repos.getReleaseByTag({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag: tag
          });
          release = response.data;

          // Upload tarball
          const tarballPath = `mir-${version}.tar.xz`;
          const tarballData = fs.readFileSync(tarballPath);

          await github.rest.repos.uploadReleaseAsset({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.id,
            name: tarballPath,
            data: tarballData
          });

          // Upload signature
          const signaturePath = `${tarballPath}.asc`;
          const signatureData = fs.readFileSync(signaturePath);

          await github.rest.repos.uploadReleaseAsset({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.id,
            name: signaturePath,
            data: signatureData
          });

          console.log(`:notice: Uploaded tarball and signature to release ${release.html_url}`);
