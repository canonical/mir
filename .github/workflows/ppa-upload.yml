name: PPA Upload

on:
  schedule:
  - cron: "0 7 * * *" # Daily at 07:00 UTC
  workflow_dispatch:
  push:
    branches:
    - release/[0-9]+.[0-9]+
    tags:
    - v[0-9]+.[0-9]+.[0-9]+
    paths-ignore:
    - ".github/**"
    - "!.github/workflows/ppa-upload.yml"
    - "*.md"
    - "COPYING.*"
    - "doc/**"
    - "rpm/**"
    - "snap/**"
    - "spread.yaml"
    - "spread/**"

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
    - name: Check for new commits since last successful run
      id: check
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ github.event_name }}" != "schedule" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        last_sha=$(gh api \
          "repos/${{ github.repository }}/actions/workflows/ppa-upload.yml/runs?status=success&branch=main&per_page=1" \
          --jq '.workflow_runs[0].head_sha // empty')
        if [ "$last_sha" != "${{ github.sha }}" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_run=false" >> "$GITHUB_OUTPUT"
        fi

  PPAUpload:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        release:
        - "24.04"
        - "25.10"
        - "26.04"
        - "devel"

    runs-on: ubuntu-latest

    steps:
    - name: Import GPG key
      id: gpg
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
      with:
        gpg_private_key: ${{ secrets.MIR_BOT_GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.MIR_BOT_GPG_PASSPHRASE }}

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # Need full history for version determination
        fetch-depth: 0
        persist-credentials: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends --yes \
          debhelper \
          devscripts \
          dput \
          dh-python \
          python3-launchpadlib

    - name: Set up Launchpad credentials
      uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: ${{ github.workspace }}/../lp_credentials
        contents: ${{ secrets.LAUNCHPAD_CREDENTIALS }}

    - name: Upload to PPA
      env:
        RELEASE: ${{ matrix.release }}
        DEBFULLNAME: ${{ steps.gpg.outputs.name }}
        DEBEMAIL: ${{ steps.gpg.outputs.email }}
      run: tools/ppa-upload.sh ${{ github.workspace }}/../lp_credentials

    - if: ${{ failure() && runner.debug }}
      name: Setup upterm session
      uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3.23
      with:
        limit-access-to-actor: true
